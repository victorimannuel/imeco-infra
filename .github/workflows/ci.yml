name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ansible-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible-core

      - name: Validate Ansible playbooks (syntax)
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible/ansible.cfg
          ANSIBLE_ROLES_PATH: ${{ github.workspace }}/ansible/roles
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          if [ -n "${ANSIBLE_VAULT_PASSWORD}" ]; then
            printf '%s' "${ANSIBLE_VAULT_PASSWORD}" > /tmp/.vault_pass
            chmod 600 /tmp/.vault_pass
            ansible-playbook -i ansible/inventories/production.yml ansible/playbooks/setup.yml --syntax-check --vault-password-file /tmp/.vault_pass
            ansible-playbook -i ansible/inventories/production.yml ansible/playbooks/deploy-apps.yml --syntax-check --vault-password-file /tmp/.vault_pass
          else
            echo "Skipping ansible-playbook syntax-check (ANSIBLE_VAULT_PASSWORD not available in this run)."
          fi
      - name: Validate role/task YAML files
        run: |
          python -m pip install yamllint
          yamllint ansible

  globalindo-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/globalindo-simetrika/package-lock.json

      - name: Build Globalindo
        working-directory: apps/globalindo-simetrika
        run: |
          npm ci
          npm run build

  go-api-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/anugrah-travel-api/go.mod

      - name: Test Anugrah Travel API
        working-directory: apps/anugrah-travel-api
        run: go test ./...

  rms-php-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer
          extensions: intl, mysqli, pdo_mysql, zip

      - name: Validate Composer and install dependencies
        working-directory: apps/radar-mandiri-sukses
        run: |
          composer validate --strict
          composer install --no-interaction --no-progress --prefer-dist
