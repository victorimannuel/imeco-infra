---
# ansible/playbooks/create-user.yml
# Usage: ansible-playbook ansible/playbooks/create-user.yml -u root
- name: Initial Server Setup - Create Deploy User
  hosts: webservers
  become: true
  vars:
    # We define the users to be created with superuser powers
    users_to_create:
      - deploy
      - victor

  tasks:
    - name: Ensure sudo package is installed
      ansible.builtin.apt:
        name: sudo
        state: present
        update_cache: yes

    - name: "Check if users already exist"
      ansible.builtin.command: "id {{ item }}"
      loop: "{{ users_to_create }}"
      register: user_check
      failed_when: false
      changed_when: false

    - name: "Report existing users"
      ansible.builtin.debug:
        msg: "User '{{ item.item }}' already exists. Skipping creation but ensuring settings."
      when: item.rc == 0
      loop: "{{ user_check.results }}"

    - name: "Create users with bash shell and add to sudo group"
      ansible.builtin.user:
        name: "{{ item }}"
        shell: /bin/bash
        groups: sudo
        append: yes
        create_home: yes
      loop: "{{ users_to_create }}"

    - name: Set up authorized key for victor (Personal Admin)
      ansible.posix.authorized_key:
        user: victor
        state: present
        key: "{{ lookup('file', '~/.ssh/general/id_ed25519_general.pub') }}"

    - name: Set up authorized key for deploy (Automation Service)
      ansible.posix.authorized_key:
        user: deploy
        state: present
        key: "{{ lookup('file', '~/.ssh/imeco/deploy/id_ed25519.pub') }}"

    - name: Allow 'sudo' group to have passwordless sudo
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        state: present
        regexp: '^%sudo'
        line: '%sudo ALL=(ALL) NOPASSWD: ALL'
        validate: 'visudo -cf %s'

    - name: Disable password authentication in SSH
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: Restart SSH

    - name: Disable root login in SSH (Security Hardening)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: Restart SSH

    - name: Remove legacy 'ansible' user if it exists (Cleanup)
      ansible.builtin.user:
        name: ansible
        state: absent
        remove: yes # This deletes the home directory too
      register: cleanup_ansible

    - name: Report cleanup status
      ansible.builtin.debug:
        msg: "Legacy 'ansible' user has been removed from the server."
      when: cleanup_ansible.changed

  handlers:
    - name: Restart SSH
      ansible.builtin.service:
        name: sshd
        state: restarted
