---
# ansible/roles/app-rms/tasks/main.yml
- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ deploy_dir }}/apps/radar-mandiri-sukses/docker-compose.prod.yml"
    mode: '0644'

- name: Template .env file (assuming user copies the structure)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ deploy_dir }}/apps/radar-mandiri-sukses/.env"
    mode: '0644'

- name: "Fix permissions for writable and uploads folders (Audit-safe: host must allow container UID to write)"
  ansible.builtin.file:
    path: "{{ deploy_dir }}/apps/radar-mandiri-sukses/{{ item }}"
    state: directory
    owner: "33"  # UID for www-data in the container
    group: "33"  # GID for www-data in the container
    mode: '0775'
    recurse: yes
  loop:
    - writable
    - public/uploads
  become: true # Only task in RMS needing root, because chown to 33 requires root

- name: Set upload directory permissions
  ansible.builtin.file:
    path: "{{ deploy_dir }}/apps/radar-mandiri-sukses/public/uploads"
    state: directory
    mode: '0777'
  become: true

- name: Build and Start RMS application
  community.docker.docker_compose_v2:
    project_src: "{{ deploy_dir }}/apps/radar-mandiri-sukses"
    files:
      - docker-compose.prod.yml
    state: present
    build: always
