---
# ansible/roles/app-rms/tasks/main.yml
- name: Preflight ownership repair for git-managed writable files
  ansible.builtin.file:
    path: "{{ deploy_dir }}/apps/radar-mandiri-sukses/writable"
    state: directory
    owner: "deploy"
    group: "deploy"
    mode: '0775'
    recurse: yes
  become: true

- name: Sync RMS source code
  ansible.builtin.git:
    repo: 'https://github.com/victorimannuel/radar-mandiri-sukses.git'
    dest: "{{ deploy_dir }}/apps/radar-mandiri-sukses"
    version: main
    recursive: yes
    force: yes

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ deploy_dir }}/apps/radar-mandiri-sukses/docker-compose.prod.yml"
    mode: '0644'

- name: Template .env file (assuming user copies the structure)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ deploy_dir }}/apps/radar-mandiri-sukses/.env"
    mode: '0644'

- name: "Fix writable folder permissions (keep git-managed files owned by deploy)"
  ansible.builtin.file:
    path: "{{ deploy_dir }}/apps/radar-mandiri-sukses/writable"
    state: directory
    owner: "deploy"
    group: "33"  # GID for www-data in the container
    mode: '0775'
    recurse: yes
  become: true # Only task in RMS needing root, because chown to 33 requires root

- name: "Fix uploads folder permissions (deploy-owned, writable by container group)"
  ansible.builtin.file:
    path: "{{ deploy_dir }}/apps/radar-mandiri-sukses/public/uploads"
    state: directory
    owner: "deploy"
    group: "33"  # GID for www-data in the container
    mode: '0775'
    recurse: yes
  become: true

- name: Build and Start RMS application
  community.docker.docker_compose_v2:
    project_src: "{{ deploy_dir }}/apps/radar-mandiri-sukses"
    files:
      - docker-compose.prod.yml
    state: present
    build: always

- name: Ensure Composer dependencies are present in RMS container
  ansible.builtin.command:
    cmd: docker exec php-ci4-rms composer install --no-dev --optimize-autoloader --no-interaction --no-progress
  register: rms_composer_install
  changed_when: "'Nothing to install, update or remove' not in rms_composer_install.stdout"

- name: Verify CodeIgniter framework boot file exists
  ansible.builtin.command:
    cmd: docker exec php-ci4-rms test -f /var/www/rms/vendor/codeigniter4/framework/system/Boot.php
