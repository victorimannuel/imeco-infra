---
# ansible/roles/security/tasks/main.yml
# All tasks here touch system-level resources — always need root.

- name: Install security packages
  ansible.builtin.apt:
    name:
      - ufw
      - fail2ban
    state: present
  become: true

- name: Setup UFW rules (Allow SSH, HTTP, HTTPS)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - '22'
    - '80'
    - '443'
  become: true

- name: Allow Custom ports if needed (e.g. phpmyadmin on 8080)
  community.general.ufw:
    rule: allow
    port: '8080'
    proto: tcp
  become: true

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny
  become: true

- name: Ensure Fail2ban is started and enabled
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: yes
  become: true

- name: Harden SSH configuration
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?{{ item.key }}"
    line: "{{ item.key }} {{ item.value }}"
    state: present
  loop:
    - { key: 'PermitRootLogin',        value: 'no' }   # create-user.yml already sets this; enforce here too
    - { key: 'PasswordAuthentication', value: 'no' }
  notify: Restart SSH
  become: true
