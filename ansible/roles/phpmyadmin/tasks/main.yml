---
# ansible/roles/phpmyadmin/tasks/main.yml
- name: Ensure phpmyadmin services directory exists
  ansible.builtin.file:
    path: "{{ deploy_dir }}/services/phpmyadmin"
    state: directory
    mode: '0755'

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ deploy_dir }}/services/phpmyadmin/docker-compose.yml"
    mode: '0644'

- name: Start phpmyadmin container
  community.docker.docker_compose_v2:
    project_src: "{{ deploy_dir }}/services/phpmyadmin"
    state: present
