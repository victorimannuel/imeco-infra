[defaults]
inventory = inventories/production.yml
roles_path = roles
vault_password_file = .vault_pass
host_key_checking = False
# User/SSH settings are managed in inventories/bootstrap.yml and inventories/production.yml
deprecation_warnings = False
retry_files_enabled = False

[privilege_escalation]
become = False          # OFF by default — tasks must opt-in with become: true
become_method = sudo
become_user = root
become_ask_pass = False
