server {
  listen 80;
  server_name
    globalindosimetrika.co.id
    gs.imannuelvictor.com;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name 
    globalindosimetrika.co.id
    gs.imannuelvictor.com;

  ssl_certificate /etc/nginx/ssl/globalindosimetrika.co.id/origin.crt;
  ssl_certificate_key /etc/nginx/ssl/globalindosimetrika.co.id/origin.key;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  root /var/www/gs/public;
  index index.html;

  location / {
    try_files $uri $uri/ =404;
  }

  # MIME types for WebP support
  include /etc/nginx/mime.types;
  types {
    image/webp webp;
  }

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css text/javascript application/javascript application/x-javascript text/xml application/xml application/xml+rss application/json image/svg+xml;

  # Caching for images (can cache longer)
  location ~* \.(webp|png|jpg|jpeg|gif|ico|svg)$ {
    expires 7d;
    add_header Cache-Control "public, no-transform";
    access_log off;
    sendfile on;
    tcp_nopush on;
  }

  # NO cache for CSS/JS - always validate
  location ~* \.(css|js)$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    access_log off;
  }
}
